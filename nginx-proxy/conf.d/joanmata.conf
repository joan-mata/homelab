# Docker DNS resolver — evita crash si los upstreams no están listos al inicio
# updated: 2026-06-03
resolver 127.0.0.11 valid=30s ipv6=off;

# ─────────────────────────────────────────────────────────────────────────────
# joanmata.com → joanmata-web (sitio web principal — siempre encendido)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name joanmata.com www.joanmata.com;

    access_log /var/log/nginx/joanmata_access.log;
    error_log  /var/log/nginx/joanmata_error.log;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location /VD/ {
        alias /srv/static/VD/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        set $upstream_joanmata cv_web_frontend;
        proxy_pass         http://$upstream_joanmata:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# cv.joanmata.com → cv-frontend (on-demand)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name cv.joanmata.com;

    resolver 127.0.0.11 valid=30s ipv6=off;

    access_log /var/log/nginx/cv_access.log;
    error_log  /var/log/nginx/cv_error.log;

    client_max_body_size 10M;

    include conf.d/snippets/_wakeup.conf;

    location / {
        set $upstream_cv cv-frontend;
        proxy_pass         http://$upstream_cv:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;

        error_page 502 503 504 = @wake;
    }
}

