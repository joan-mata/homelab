# Docker DNS resolver — evita crash si los upstreams no están listos al inicio
resolver 127.0.0.11 valid=30s ipv6=off;

# ─────────────────────────────────────────────────────────────────────────────
# joanmata.com → joanmata-web (sitio web principal)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name joanmata.com www.joanmata.com;

    access_log /var/log/nginx/joanmata_access.log;
    error_log  /var/log/nginx/joanmata_error.log;

    location / {
        set $upstream_joanmata joanmata-web;
        proxy_pass         http://$upstream_joanmata:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# cv.joanmata.com → cv-frontend (Create_CVs app)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name cv.joanmata.com;

    access_log /var/log/nginx/cv_access.log;
    error_log  /var/log/nginx/cv_error.log;

    # Límite para uploads
    client_max_body_size 10M;

    location / {
        set $upstream_cv cv-frontend;
        proxy_pass         http://$upstream_cv:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts largos para IA y PDFs
        proxy_read_timeout    300s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# refnotes.joanmata.com → refnotes-frontend (RefereeNotes app)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name refnotes.joanmata.com;

    access_log /var/log/nginx/refnotes_access.log;
    error_log  /var/log/nginx/refnotes_error.log;

    location / {
        set $upstream_refnotes refnotes-frontend;
        proxy_pass         http://$upstream_refnotes:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
# ─────────────────────────────────────────────────────────────────────────────
# f1.joanmata.com → f1-proxy (F1 Archive project)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name f1.joanmata.com;

    access_log /var/log/nginx/f1_access.log;
    error_log  /var/log/nginx/f1_error.log;

    # Importante: el Proxy de F1 maneja la Auth Basic
    client_max_body_size 1G;

    location / {
        set $upstream_f1 f1-proxy;
        proxy_pass         http://$upstream_f1:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
