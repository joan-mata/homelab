server {
    listen 80;
    server_name n8n.joanmata.com;

    resolver 127.0.0.11 valid=30s ipv6=off;

    include conf.d/snippets/_wakeup.conf;

    access_log /var/log/nginx/n8n_access.log;
    error_log  /var/log/nginx/n8n_error.log;

    # Spotify OAuth2 callback — temporary, remove after auth
    location = /callback {
        set $upstream_n8n n8n;
        proxy_pass         http://host.docker.internal:8888;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Webhooks bypass Authelia — Telegram and external triggers call these
    location /webhook/ {
        set $upstream_n8n n8n;
        proxy_pass         http://$upstream_n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location /webhook-test/ {
        set $upstream_n8n n8n;
        proxy_pass         http://$upstream_n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # UI and everything else — protected by Authelia
    location / {
        include conf.d/snippets/_authelia.conf;

        set $upstream_n8n n8n;
        proxy_pass         http://$upstream_n8n:5678;
        error_page 502 503 504 = @wake;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
