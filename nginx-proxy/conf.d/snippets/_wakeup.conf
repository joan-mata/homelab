# On-demand wakeup: included in every server block that needs lazy-start.
# Add  error_page 502 503 504 = @wake;  inside the main location block.
# Requires  resolver 127.0.0.11 valid=30s ipv6=off;  in the server block.

location /_wakeup/ {
    set $wakeup wakeup;
    proxy_pass         http://$wakeup:8080;
    proxy_set_header   X-Wake-Host $host;
    proxy_set_header   Host        $host;
}

location @wake {
    internal;
    set $wakeup wakeup;
    proxy_set_header   X-Wake-Host   $host;
    proxy_set_header   X-Wake-URI    $request_uri;
    proxy_set_header   X-Wake-Scheme $http_x_forwarded_proto;
    proxy_pass         http://$wakeup:8080;
}
